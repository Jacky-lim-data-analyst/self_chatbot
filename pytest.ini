# no need asyncio decorator for pytest
# short traceback style - only shows the failing line
# markers section declaration
# summary of all non-passed tests

[pytest]
asyncio_mode = auto   
testpaths = test
pythonpath = .
addopts = 
    -v 
    --tb=short    
    --strict-markers   
    -ra     
markers = 
    unit: Pure logic test with no I/O
    integration: Tests that spin up the FastAPI app via TestClient
